<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laffle オーダー</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f9f9f9; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        h1 { color: #d9534f; margin-top: 30px; font-size: 28px; }
        p { color: #666; margin-bottom: 30px; }
        
        .category-container { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            padding: 0 10px;
        }
        
        /* ボタンのデザイン */
        .category-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            color: #333;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .category-btn:active { transform: scale(0.98); }
        .btn-waffle { border-bottom: 6px solid #ffcc00; }
        .btn-drink { border-bottom: 6px solid #8c52ff; }
        
        /* 画像のサイズ調整 */
        .category-img {
            width: 100%;         /* 横幅は親要素（ボタン）いっぱいにする */
            height: auto;        /* 高さは自動計算にする（150pxから変更） */
            aspect-ratio: 1 / 1; /* ★ここを追加：正方形にする（縦横比 1:1） */
            object-fit: cover;   /* 画像を枠いっぱいに綺麗にはめ込む */
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1>Laffle</h1>
    <p>ご注文のカテゴリを選んでください</p>
    
    <div class="category-container">
        
        <a href="{% url 'product_list' 'waffle' %}" class="category-btn btn-waffle">
            <img src="https://res.cloudinary.com/dhsqyxa7k/image/upload/v1/media/products/%E3%82%AA%E3%83%AC%E3%83%B3%E3%82%B8%E7%B4%85%E8%8C%B6_hdsupb" alt="ワッフル" class="category-img">
            ワッフル
        </a>
        
        <a href="{% url 'product_list' 'drink' %}" class="category-btn btn-drink">
            <img src="https://res.cloudinary.com/dhsqyxa7k/image/upload/v1/media/products/Gemini_Generated_Image_d49i8sd49i8sd49i_z8s81h" alt="ドリンク" class="category-img">
            ドリンク
        </a>
        
    </div>
</body>
</html>

{% extends 'store/base.html' %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <h2 class="mb-4 text-danger fw-bold">✏️ 注文編集</h2>
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-danger text-white">
            <span class="fs-5 fw-bold">{{ order.customer_name }} 様</span>
            <span class="ms-2 badge bg-white text-danger">{{ order.created_at|date:"H:i" }}</span>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>商品</th>
                            <th style="width: 110px;">数量</th>
                            <th style="width: 60px;">削除</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in order.items.all %}
                        <tr>
                            <td>{{ item.product.name }}</td>
                            <td>
                                <input type="number" name="quantity_{{ item.id }}"
                                       value="{{ item.quantity }}" min="0"
                                       class="form-control form-control-sm">
                            </td>
                            <td class="text-center">
                                <input type="checkbox" name="delete_{{ item.id }}" class="form-check-input">
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-danger flex-grow-1">保存する</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary flex-grow-1">キャンセル</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
